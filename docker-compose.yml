version: '3.8'

services:
  sickle-cell-ai:
    build: .
    container_name: sickle-cell-ai
    ports:
      - "3000:3000"  # Frontend
      - "8000:8000"  # Backend API
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models  # Mount models for persistence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: sickle-cell-ai-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - sickle-cell-ai
    restart: unless-stopped
    profiles: ["production"]  # Only start with: docker-compose --profile production up

volumes:
  models:
